<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Apex CRM | Premium Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .floating-animation {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .gradient-bg {
            background: linear-gradient(135deg, #f8f9ff 0%, #e5eeff 100%);
            position: relative;
            overflow: hidden;
        }

        .gradient-blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.5;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#dce9ff",
                        "background": "#f8f9ff",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#eff4ff",
                        "inverse-surface": "#213145",
                        "surface-variant": "#d3e4fe",
                        "outline-variant": "#c3c6d7",
                        "surface": "#f8f9ff",
                        "primary": "#004ac6",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#0b1c30",
                        "on-surface-variant": "#434655",
                        "primary-container": "#2563eb",
                        "on-background": "#0b1c30",
                        "on-primary-container": "#eeefff",
                        "outline": "#737686",
                        "surface-container-highest": "#d3e4fe"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "xl": "32px",
                        "2xl": "48px",
                        "base": "8px",
                        "sm": "8px",
                        "xs": "4px",
                        "gutter": "24px",
                        "3xl": "64px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "headline-lg": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md overflow-hidden">
<!-- Animated Background Context -->
<div class="gradient-bg fixed inset-0 flex items-center justify-center">
<!-- Background Blobs -->
<div class="gradient-blob w-[500px] h-[500px] bg-primary-container/20 -top-20 -left-20"></div>
<div class="gradient-blob w-[400px] h-[400px] bg-secondary/10 bottom-0 right-0" style="animation-delay: -5s;"></div>
<div class="gradient-blob w-[300px] h-[300px] bg-tertiary/10 top-1/2 left-1/2" style="animation-delay: -10s;"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-[440px] px-margin-mobile md:px-0">
<!-- Branding Header -->
<div class="text-center mb-xl floating-animation">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-white shadow-sm mb-md border border-outline-variant/30">
<span class="material-symbols-outlined text-primary text-[40px]" data-icon="architecture" style="font-variation-settings: 'FILL' 1;">architecture</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">Apex CRM</h1>
<p class="text-on-surface-variant font-body-md mt-xs">The Sophisticated Architect's Workspace</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-xl p-xl shadow-sm">
<div class="mb-lg">
<h2 class="font-headline-md text-headline-md text-on-surface">Welcome back</h2>
<p class="text-on-surface-variant font-label-md">Enter your credentials to access the workspace.</p>
</div>
<form class="space-y-lg" id="loginForm">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface ml-1" for="email">Work Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full h-12 pl-[48px] pr-md bg-surface-container-lowest border border-outline-variant/50 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-md" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-on-surface" for="password">Password</label>
<a class="text-primary font-label-md hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full h-12 pl-[48px] pr-[48px] bg-surface-container-lowest border border-outline-variant/50 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-md" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="visibilityIcon">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-12 bg-primary text-on-primary font-label-md rounded-lg shadow-sm hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-base" type="submit">
                        Sign In to Dashboard
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-xl">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-label-md">
<span class="bg-white/0 px-md text-outline">or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center h-12 border border-outline-variant/50 rounded-lg bg-surface-container-lowest hover:bg-surface-container-low transition-colors active:scale-[0.98]">
<img class="w-5 h-5 mr-base" data-alt="Official Google logo with vibrant primary colors in a minimalist flat design, isolated on white background for high-end UI placement." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD_U2qj1M0DBIhD2UjambeQdl_bw7hu5_CB3YxYkaRLaCzjGe0BlooSBiFo96Z-CqGXhLgF1Yd2d4WhGcGnoXku1v4pXwG6OWHjN2mkvi3wj-is_PzMoQ2GQAJpHV6XuFBfSIz7HpacYl_6VNSh3islav83Ir77g90x15w1jg4N6OQaHel3KqxdzCotcFgQ7JCG2toeQUcw5eNNiUMqPZKSS8ziB8EDHMaPjj1ypkSvgRsbzrHd0IN6x5tIa1fLfrzpT0hyCSk19y4"/>
<span class="font-label-md">Google</span>
</button>
<button class="flex items-center justify-center h-12 border border-outline-variant/50 rounded-lg bg-surface-container-lowest hover:bg-surface-container-low transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined mr-base" data-icon="terminal">terminal</span>
<span class="font-label-md">SSO</span>
</button>
</div>
<div class="mt-xl text-center">
<p class="text-on-surface-variant font-label-md">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline" href="#">Request Access</a>
</p>
</div>
</div>
<!-- Footer Links -->
<footer class="mt-xl flex justify-center gap-xl">
<a class="text-outline font-label-md hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<a class="text-outline font-label-md hover:text-on-surface transition-colors" href="#">Terms of Service</a>
<a class="text-outline font-label-md hover:text-on-surface transition-colors" href="#">System Status</a>
</footer>
</main>
</div>
<!-- Background Decorative Animation -->
<div class="fixed inset-0 pointer-events-none z-0">

</div>
<script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibilityIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.innerText = 'visibility';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Premium micro-interaction loading state
            btn.innerHTML = '<div class="w-5 h-5 border-2 border-on-primary/30 border-t-on-primary rounded-full animate-spin"></div>';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Verified';
                btn.classList.replace('bg-primary', 'bg-success');
                setTimeout(() => {
                    alert('Authenticated successfully! Redirecting to workspace...');
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                }, 1000);
            }, 1500);
        });

        // Background movement interaction
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            document.querySelectorAll('.gradient-blob').forEach((blob, index) => {
                const multiplier = (index + 1) * 20;
                blob.style.transform = `translate(${x * multiplier}px, ${y * multiplier}px)`;
            });
        });
    </script>
</body></html>
